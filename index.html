<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Cricket Auctioneer</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="./css/auction.css" />
<link rel="icon" href="data:,">
  
<style>
  body { font-family: Inter, system-ui; }
  .countdown.blink { animation: blink 1s steps(2, start) infinite; }
  @keyframes blink { to { visibility: hidden; } }
  button:disabled { cursor: not-allowed; opacity: 0.5; }
</style>
</head>

<body class="bg-slate-50 text-slate-900 scroll-smooth">

<!-- ================= HEADER ================= -->

<header class="sticky top-0 z-40 bg-white/90 backdrop-blur border-b border-slate-200">
  <div class="max-w-7xl mx-auto px-4 py-3 flex items-center gap-3">
    <div class="text-xl font-bold">Independence Cup 2026</div>
    <nav class="ml-auto flex items-center gap-2 text-sm">
      <button id="btnSaveState" class="px-3 py-1.5 rounded-xl bg-slate-900 text-white">Save</button>
      <label class="px-3 py-1.5 rounded-xl bg-slate-100 hover:bg-slate-200 cursor-pointer">
        Load
        <input id="fileLoadState" type="file" accept="application/json" class="hidden" />
      </label>
      <button id="btnExportCSV" class="px-3 py-1.5 rounded-xl bg-emerald-600 text-white">Export CSV</button>
      <button id="btnResetAll" class="px-3 py-1.5 rounded-xl border border-rose-300 text-rose-700">Reset</button>
    </nav>
  </div>
</header>

<!-- ================= MAIN ================= -->

<main class="max-w-7xl mx-auto p-4 space-y-4">

  <!-- TOP LEVEL TABS -->
  <div class="bg-white rounded-2xl border border-slate-200 p-3">
    <div class="flex items-center gap-2 flex-wrap">
      <button
        id="tabAuctionView"
        class="px-4 py-2 rounded-xl bg-slate-900 text-white text-sm font-medium"
      >
        Auction
      </button>
      <button
        id="tabAdminView"
        class="px-4 py-2 rounded-xl bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200"
      >
        Admin
      </button>
    </div>
  </div>

  <!-- AUCTION VIEW -->
  <div id="auctionView">
    <div class="grid lg:grid-cols-3 gap-4">

      <!-- LEFT SIDE -->
      <section class="lg:col-span-2 space-y-4">

        <!-- Category Controls -->
        <div class="bg-white rounded-2xl border border-slate-200 p-4">
          <div class="flex items-center justify-between flex-wrap gap-3">

            <div class="flex items-center gap-2">
              <span class="text-sm text-slate-600">Category:</span>
              <div class="inline-flex rounded-xl overflow-hidden border border-slate-200">
                <button data-cat="X" class="catBtn px-3 py-1.5 text-sm hover:bg-slate-100">Elite</button>
                <button data-cat="P" class="catBtn px-3 py-1.5 text-sm hover:bg-slate-100">Prime</button>
                <button data-cat="A" class="catBtn px-3 py-1.5 text-sm hover:bg-slate-100">Core</button>
                <button data-cat="B" class="catBtn px-3 py-1.5 text-sm hover:bg-slate-100">Developing</button>
                <button data-cat="UNSOLD" class="catBtn px-3 py-1.5 text-sm hover:bg-slate-100">UnSold</button>
              </div>
            </div>

            <div class="flex items-center gap-2">
              <button id="btnNext" class="px-3 py-1.5 rounded-xl bg-blue-600 text-white">Next Player</button>
              <button id="btnSkip" class="px-3 py-1.5 rounded-xl border border-slate-300">Skip</button>
              <button id="btnUndo" class="px-3 py-1.5 rounded-xl border border-amber-300 text-amber-700">Undo</button>
            </div>

          </div>
        </div>

        <!-- Current Player -->
        <div id="currentPlayerCard" class="bg-white rounded-2xl border border-slate-200 p-4 grid md:grid-cols-3 gap-4" hidden>

          <div>
            <img id="playerImg" class="w-full h-56 rounded-xl border bg-slate-100" />
          </div>

          <div class="md:col-span-2 grid md:grid-cols-2 gap-4 items-start">
            <div class="space-y-3">
              <h2 id="playerName" class="text-xl font-bold">—</h2>
              <p>Category: <span id="playerCat">—</span></p>
              <p>Position: <span id="playerPosition">—</span></p>
              <p>Base Price: <span id="playerBase">—</span></p>
          
              <div>
                <label class="text-sm">Bid Increment</label>
                <input id="bidStep" type="number" value="25000" class="w-full border rounded-xl mt-1 p-1" />
              </div>
          
              <div>
                <label class="text-sm">Current Bid</label>
                <input id="currentBid" type="number" readonly class="w-full border rounded-xl mt-1 p-1" />
              </div>
            </div>
          
            <div class="current-bidder-box">
              <div class="current-bidder-label">Current Bidder</div>
              <div id="currentBidderName" class="current-bidder-name">—</div>
            </div>
          
            <div class="md:col-span-2">
              <div id="bidTeamsContainer" class="grid grid-cols-3 gap-2"></div>
          
              <div class="flex items-center gap-3 mt-3">
                <button id="btnSell" class="px-3 py-2 rounded-xl bg-emerald-600 text-white">Sell</button>
                <span>Timer: <span id="countdown">—</span></span>
                <button id="btnCancelTimer" class="px-2 py-1 border rounded-lg text-xs">Cancel</button>
              </div>
          
              <div id="warn" class="text-rose-600 text-sm mt-2"></div>
            </div>
          </div>

        </div>

        <!-- Remaining -->
        <div class="bg-white rounded-2xl border border-slate-200 p-4">
          <h3 class="font-semibold mb-2">
            Remaining in Category <span id="remainCat">—</span> (<span id="remainCount">0</span>)
          </h3>
          <div id="remainList" class="grid sm:grid-cols-2 md:grid-cols-3 gap-2"></div>
        </div>

      </section>

      <!-- RIGHT SIDE -->
      <aside class="space-y-4">

        <div class="bg-white rounded-2xl border border-slate-200 p-4">
          <div class="flex items-center gap-2 mb-4 flex-wrap">
            <button
              id="tabBudgets"
              class="px-3 py-1.5 rounded-xl bg-slate-900 text-white text-sm font-medium"
            >
              Team Budgets
            </button>
            <button
              id="tabResults"
              class="px-3 py-1.5 rounded-xl bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200"
            >
              Results
            </button>
          </div>

          <div id="budgetsTabContent">
            <h3 class="font-semibold mb-2">Team Budgets</h3>
            <div id="teamsTable" class="divide-y"></div>
          </div>

          <div id="resultsTabContent" class="hidden">
            <h3 class="font-semibold mb-2">Results</h3>
            <div id="results" class="mt-3 space-y-3"></div>
          </div>
        </div>

      </aside>
    </div>
  </div>

  <!-- ADMIN VIEW -->
  <div id="adminView" class="hidden space-y-4">

    <div class="bg-white rounded-2xl border border-slate-200 p-4">
      <div class="flex items-center gap-2 mb-4 flex-wrap">
        <button
          id="tabAdminBudgets"
          class="px-3 py-1.5 rounded-xl bg-slate-900 text-white text-sm font-medium"
        >
          Team Budgets
        </button>
        <button
          id="tabAdminResults"
          class="px-3 py-1.5 rounded-xl bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200"
        >
          Results
        </button>
        <button
          id="tabAdminPlayerManagement"
          class="px-3 py-1.5 rounded-xl bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200"
        >
          Player Management
        </button>
        <button
          id="tabAdminReauction"
          class="px-3 py-1.5 rounded-xl bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200"
        >
          Reauction
        </button>
        <button
          id="tabAdminRules"
          class="px-3 py-1.5 rounded-xl bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200"
        >
          Rules
        </button>
      </div>

      <!-- Admin Budgets -->
      <div id="adminBudgetsTabContent">
        <h3 class="font-semibold mb-2">Team Budgets</h3>
        <div id="adminTeamsTable" class="divide-y"></div>
      </div>

      <!-- Admin Results -->
      <div id="adminResultsTabContent" class="hidden">
        <h3 class="font-semibold mb-2">Results</h3>
        <div id="adminResults" class="mt-3 space-y-3"></div>
      </div>

      <!-- Admin Player Management -->
      <div id="adminPlayerManagementTabContent" class="hidden">
        <div class="flex items-center justify-between mb-3">
          <h3 class="font-semibold">Player Management</h3>
          <button
            id="btnTogglePlayerManagementEdit"
            class="px-3 py-1.5 rounded-xl border border-slate-300 text-sm"
          >
            Enable Edit Mode
          </button>
        </div>

        <div id="playerManagementPools" class="grid md:grid-cols-2 xl:grid-cols-3 gap-4"></div>
      </div>

      <!-- Admin Reauction -->
      <div id="adminReauctionTabContent" class="hidden">
        <h3 class="font-semibold mb-3">Reauction Sold Players</h3>
        <div id="adminReauctionList" class="space-y-3"></div>
      </div>

      <div id="adminRulesTabContent" class="hidden">
        <h3 class="font-semibold mb-3">Auction Rules</h3>
      
        <div class="grid md:grid-cols-2 gap-4 mb-4">
          <label class="block">
            <span class="text-sm text-slate-600">Minimum Players Per Team</span>
            <input
              id="ruleMinPlayersPerTeam"
              type="number"
              min="1"
              class="w-full border rounded-xl mt-1 p-2"
            />
          </label>
      
          <label class="block">
            <span class="text-sm text-slate-600">Maximum Players Per Team</span>
            <input
              id="ruleMaxPlayersPerTeam"
              type="number"
              min="1"
              class="w-full border rounded-xl mt-1 p-2"
            />
          </label>
        </div>
      
        <div class="overflow-x-auto">
          <table class="min-w-full border border-slate-200 rounded-xl overflow-hidden text-sm">
            <thead class="bg-slate-100">
              <tr>
                <th class="text-left px-3 py-2">Pool</th>
                <th class="text-left px-3 py-2">Mandatory</th>
                <th class="text-left px-3 py-2">Min</th>
                <th class="text-left px-3 py-2">Max</th>
              </tr>
            </thead>
            <tbody id="rulesPoolsTableBody"></tbody>
          </table>
        </div>
      
        <div class="mt-4 flex items-center gap-2">
          <button
            id="btnSaveRules"
            class="px-3 py-1.5 rounded-xl bg-slate-900 text-white"
          >
            Save Rules
          </button>
        </div>
      
        <div id="rulesMessage" class="mt-3 text-sm text-slate-600"></div>
      </div>
      
    </div>

  </div>

</main>

<!-- ================= SCRIPTS ================= -->

<script src="./js/config.js"></script>
<script src="./js/state.js"></script>
<script src="./js/utils.js"></script>
<script src="./js/timer.js"></script>
<script src="./js/storage.js"></script>
<script src="./js/actions.js"></script>
<script src="./js/renderer.js"></script>
<script src="./js/autosave.js"></script>
<script type="module" src="./js/firebase.js"></script>
<script src="./js/main.js"></script>

</body>
</html>
