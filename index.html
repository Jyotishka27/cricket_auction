  <script>
  (async function initAuction() {
    try {
      await loadAuctionData();

      const restored = restoreAutoSavedState();
      if (!restored && typeof cloneData === "function") {
        cloneData();
      }

      if (typeof wireEvents === "function") {
        wireEvents();
      }

      renderAll();
    } catch (err) {
      console.error("Initialization failed:", err);
    }
  })();
  </script>
